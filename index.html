<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>🐰🍎 兔子苹果助农函数课堂 · 盈亏点对齐修复</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', 'Arial', 'Helvetica', sans-serif;
      /* 背景图：使用指定的背景图片 */
      background-image: url('background.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      padding: 24px;
      /* 白色覆盖层 */
      position: relative;
    }
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(255, 255, 255, 0.7);
      z-index: -1;
    }
    .wrap {
      max-width: 1400px;
      margin: auto;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 24px;
    }
    .panel, .chart {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(10px);
      border-radius: 28px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
    }
    .panel {
      padding: 24px;
    }
    .title {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 90px;
    }
    .round-image {
      border-radius: 50%;
      object-fit: cover;
    }
    .rabbit-image {
      width: 48px;
      height: 48px;
    }
    .apple-image {
      width: 40px;
      height: 40px;
    }
    .sub {
      color: #475569;
      margin: 8px 0 20px;
      font-size: 16px;
    }
    .row {
      margin: 20px 0;
    }
    .lab {
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 17px;
      display: flex;
      justify-content: space-between;
    }
    .val {
      font-weight: 600;
      background: #fff2cc;
      padding: 2px 12px;
      border-radius: 40px;
      font-size: 16px;
    }
    input[type="range"] {
      width: 100%;
      accent-color: #f59e0b;
    }
    .cost-slider input[type="range"] {
      accent-color: #e11d48;
    }
    .revenue-slider input[type="range"] {
      accent-color: #16a34a;
    }
    .profit-slider input[type="range"] {
      accent-color: #2563eb;
    }
    .box {
      padding: 16px 18px;
      border-radius: 24px;
      background: linear-gradient(90deg, #fde68a, #fed7aa);
      font-weight: 700;
      font-size: 18px;
      margin-top: 24px;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
    }
    .chart {
      padding: 16px;
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(8px);
    }
    canvas {
      width: 100%;
      height: auto;
      border-radius: 22px;
      display: block;
      touch-action: none;
    }
    label {
      font-size: 19px;
      font-weight: bold;
      cursor: pointer;
    }
    .cost-label {
      color: #e11d48;
    }
    .revenue-label {
      color: #16a34a;
    }
    .profit-label {
      color: #2563eb;
    }
    input[type="checkbox"] {
      margin-right: 10px;
      transform: scale(1.1);
      accent-color: #3b82f6;
    }
    @media (max-width: 980px) {
      .wrap {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <div class="title">
      <img src="rabbit (2).png" alt="兔子" class="round-image rabbit-image">
      <img src="apple.png" alt="苹果" class="round-image apple-image">
      助农函数乐园
    </div>
    <div class="row">
      <label class="cost-label"><input type="checkbox" id="c1" checked> 📉 成本 <i>C = k·x + b</i></label>
    </div>
    <div class="row cost-slider">
      <div class="lab">📦 单位成本 k <span class="val" id="kv">2.0</span></div>
      <input id="k" type="range" min="0" max="10" step="0.5" value="2">
    </div>
    <div class="row cost-slider">
      <div class="lab">🏭 固定成本 b <span class="val" id="bv">20</span></div>
      <input id="b" type="range" min="0" max="100" step="1" value="20">
    </div>
    <div class="row">
      <label class="revenue-label"><input type="checkbox" id="c2" checked> 📈 收益 <i>R = p·x</i></label>
    </div>
    <div class="row revenue-slider">
      <div class="lab">💰 售价 p <span class="val" id="pv">6.0</span></div>
      <input id="p" type="range" min="0" max="15" step="0.5" value="6">
    </div>
    <div class="row">
      <label class="profit-label"><input type="checkbox" id="c3" checked> ⚖️ 利润 <i>L = R – C</i></label>
    </div>

  </div>
  <div class="chart">
    <canvas id="cv" width="980" height="620"></canvas>
  </div>
</div>
<script>
  (function(){
    const cv = document.getElementById('cv');
    const ctx = cv.getContext('2d');
    const ids = id => document.getElementById(id);

    const state = { tip: null };

    ['k', 'b', 'p', 'c1', 'c2', 'c3'].forEach(id => {
      ids(id).addEventListener('input', draw);
    });

    cv.addEventListener('mouseleave', () => {
      state.tip = null;
      draw();
    });

    cv.addEventListener('mousemove', (e) => move(e));

    function f() {
      const k = +ids('k').value;
      const b = +ids('b').value;
      const p = +ids('p').value;
      return {
        C: x => k * x + b,
        R: x => p * x,
        L: x => (p - k) * x - b,
        k, b, p
      };
    }

    function roundRect(x, y, w, h, r, fill) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
      if (fill) ctx.fill();
      else ctx.stroke();
    }

    function draw() {
      const { C, R, L, k, b, p } = f();

      ids('kv').textContent = k.toFixed(1) + ' 元/箱';
      ids('bv').textContent = b + ' 元';
      ids('pv').textContent = p.toFixed(1) + ' 元/箱';

      const w = cv.width, h = cv.height;
      const margin = 70;
      const pw = w - margin * 2;
      const ph = h - margin * 2;

      // 固定y轴范围，确保覆盖所有可能的函数值
      let min = -300;
      let max = 800;

      const sx = x => margin + (x / 100) * pw;
      const sy = y => h - margin - ((y - min) / (max - min)) * ph;

      // 透明背景，允许看到页面背景图片
      ctx.clearRect(0, 0, w, h);
      
      // 移除内部底框，只保留外部.chart底框

      // 图标已移至标题部分

      ctx.font = '14px "Segoe UI", Arial, sans-serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';
      
      // 网格
      ctx.lineWidth = 1.2;
      ctx.strokeStyle = 'rgba(148, 163, 184, 0.35)';
      
      ctx.fillStyle = '#1e293b';
      ctx.font = '13px "Segoe UI", Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      for (let i = 0; i <= 10; i++) {
        const xPos = margin + (i / 10) * pw;
        ctx.beginPath();
        ctx.moveTo(xPos, margin);
        ctx.lineTo(xPos, h - margin);
        ctx.stroke();
        ctx.fillText(i * 10, xPos, h - margin + 6);
      }

      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      ctx.font = '16px "Segoe UI", Arial, sans-serif';
      for (let i = 0; i <= 8; i++) {
        const yPos = margin + (i / 8) * ph;
        ctx.beginPath();
        ctx.moveTo(margin, yPos);
        ctx.lineTo(w - margin, yPos);
        ctx.stroke();
        const val = max - (i / 8) * (max - min);
        ctx.fillText(val.toFixed(0), margin - 10, yPos);
      }

      // 坐标轴
      ctx.lineWidth = 3;
      ctx.strokeStyle = '#1e293b';
      ctx.beginPath();
      ctx.moveTo(margin, h - margin);
      ctx.lineTo(w - margin, h - margin);
      ctx.moveTo(margin, margin);
      ctx.lineTo(margin, h - margin);
      ctx.stroke();

      ctx.font = 'bold 15px "Segoe UI", Arial, sans-serif';
      ctx.fillStyle = '#0f172a';
      ctx.textAlign = 'center';
      ctx.fillText('📦 销售量 (箱)', w / 2, h - 18);
      ctx.save();
      ctx.translate(22, h / 2);
      ctx.rotate(-Math.PI / 2);
      ctx.textAlign = 'center';
      ctx.fillText('💰 金额', 0, 0);
      ctx.restore();

      const showC = ids('c1').checked;
      const showR = ids('c2').checked;
      const showL = ids('c3').checked;

      function plotCurve(name, color, isVisible, fn) {
        if (!isVisible) return;
        ctx.shadowColor = color;
        ctx.shadowBlur = 12;
        ctx.lineWidth = 5;
        // 将十六进制颜色转换为半透明rgba
        function hexToRgba(hex, alpha) {
          const r = parseInt(hex.slice(1, 3), 16);
          const g = parseInt(hex.slice(3, 5), 16);
          const b = parseInt(hex.slice(5, 7), 16);
          return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }
        ctx.strokeStyle = hexToRgba(color, 0.8);
        ctx.beginPath();
        for (let x = 0; x <= 100; x++) {
          const X = sx(x);
          const Y = sy(fn(x));
          if (x === 0) ctx.moveTo(X, Y);
          else ctx.lineTo(X, Y);
        }
        ctx.stroke();
        ctx.shadowBlur = 0;
      }

      plotCurve('C', '#e11d48', showC, C);
      plotCurve('R', '#16a34a', showR, R);
      plotCurve('L', '#2563eb', showL, L);



      // 悬浮提示
      if (state.tip) {
        const tip = state.tip;
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#0f172a';
        ctx.fillStyle = '#1e293b';
        ctx.beginPath();
        ctx.arc(tip.x, tip.y, 7, 0, 2 * Math.PI);
        ctx.fill();
        ctx.shadowBlur = 0;
        
        ctx.font = '14px "Segoe UI", Arial, sans-serif';
        const tipText = tip.t;
        const textW = ctx.measureText(tipText).width;
        const boxW = textW + 28;
        const boxH = 32;
        let boxX = tip.x + 16;
        let boxY = tip.y - 42;
        if (boxX + boxW > w - 20) boxX = tip.x - boxW - 16;
        if (boxY < 20) boxY = tip.y + 20;
        
        ctx.fillStyle = 'rgba(15, 23, 42, 0.92)';
        roundRect(boxX, boxY, boxW, boxH, 12, true);
        ctx.fillStyle = '#f8fafc';
        ctx.font = '600 14px "Segoe UI", Arial, sans-serif';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillText(tipText, boxX + 14, boxY + boxH/2);
      }

      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';
    }

    function move(e) {
      const rect = cv.getBoundingClientRect();
      const scaleX = cv.width / rect.width;
      const scaleY = cv.height / rect.height;
      const mx = (e.clientX - rect.left) * scaleX;
      const my = (e.clientY - rect.top) * scaleY;

      const { C, R, L } = f();
      const w = cv.width, h = cv.height;
      const margin = 70;
      const pw = w - margin * 2;
      const ph = h - margin * 2;

      // 检查鼠标是否在图表区域内
      if (mx < margin || mx > w - margin || my < margin || my > h - margin) {
        state.tip = null;
        draw();
        return;
      }

      let x = Math.round(((mx - margin) / pw) * 100);
      x = Math.max(0, Math.min(100, x));

      // 使用固定y轴范围，与draw函数保持一致
      let min = -300;
      let max = 800;
      const sy = y => h - margin - ((y - min) / (max - min)) * ph;

      const candidates = [];
      if (ids('c1').checked) candidates.push({ val: C(x), name: '成本' });
      if (ids('c2').checked) candidates.push({ val: R(x), name: '收益' });
      if (ids('c3').checked) candidates.push({ val: L(x), name: '利润' });

      let best = null;
      let minDist = 40;
      candidates.forEach(item => {
        const py = sy(item.val);
        const dist = Math.abs(py - my);
        if (dist < minDist) {
          minDist = dist;
          best = {
            x: mx,
            y: py,
            t: `📌 x = ${x} 箱  ·  ${item.name} = ${item.val.toFixed(1)}`
          };
        }
      });

      // 只有当找到足够近的函数点时才显示提示
      if (best) {
        state.tip = best;
      } else {
        state.tip = null;
      }

      draw();
    }

    draw();
  })();
</script>
</body>
</html>
